<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mobile-app light-bg" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 30px;">
        <div style="font-size: 80px; margin-bottom: 16px; color: {{ icon_color }};">
            <i class="{{ icon }}"></i>
        </div>
        <h2 style="margin-bottom: 12px; font-size: 24px; color: var(--text-dark);">{{ title }}</h2>
        <p style="color: var(--text-gray); margin-bottom: 40px; font-size: 15px; line-height: 1.6;">{{ message }}</p>
        <a href="{{ back_url }}" class="submit-btn" style="text-decoration: none; width: 100%; display: block; box-sizing: border-box;">{{ back_text }}</a>
    </div>
</body>
</html>
